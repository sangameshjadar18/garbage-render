{% extends 'base.html' %}

{% block title %}Delete Bin — Location Based GMS{% endblock %}

{% block content %}
<div class="form-page" style="padding-top: 90px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="form-card fade-in text-center">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
                    <h4 class="mb-2">Confirm Deletion</h4>
                    <p class="text-secondary mb-4">
                        Are you sure you want to delete <strong>Bin #{{ bin.id }}</strong> at <strong>{{ bin.location }}</strong>? 
                        This action cannot be undone.
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-primary-custom" style="background: var(--gradient-warm);">
                                <i class="bi bi-trash me-2"></i>Yes, Delete
                            </button>
                            <a href="{% url 'manage_bins' %}" class="btn btn-outline-custom">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
